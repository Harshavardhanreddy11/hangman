<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Pro - Elite Edition</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="theme-indigo">
    <div class="game-container">
        <div class="controls-wrapper">
            <select id="gameSelect" class="styled-select">
                <option value="time-attack">Mode: Time Attack</option>
                <option value="classic">Mode: Classic</option>
            </select>

            
            <select id="themeSelect" class="styled-select">
                <option value="theme-indigo">Theme: Indigo</option>
                <option value="theme-emerald">Theme: Emerald</option>
                <option value="theme-sunset">Theme: Sunset</option>
                <option value="theme-cyber">Theme: Cyberpunk</option>
            </select>

            <select id="chapterSelect" class="styled-select">
                <option value="internal">Chapter: Startup</option>
            </select>

            <label class="upload-btn">
                📁 Upload JSON <input type="file" id="fileInput" accept=".json" hidden>
            </label>
        </div>
        <div class="main-card">
            <div class="left-panel">
                <div class="stats-bar">
                    <div class="stat">Score: <span id="currentScore">0</span></div>
                    <div class="stat">Time: <span id="timer">60</span>s</div>
                </div>
                <canvas id="hangmanCanvas" width="200" height="250"></canvas>
                <h2 class="title">HANGMAN PRO</h2>
            </div>
        
            <div class="right-panel">
                <div class="category-tag">Category: <span id="categoryName">General</span></div>
                <div id="wordDisplay" class="word-display"></div>
                <p class="hint"><strong>Hint:</strong> <span id="hintText"></span></p>
                <p class="status">Mistakes: <span id="mistakes">0 / 6</span></p>
                
                <div id="keyboard" class="keyboard"></div>

                <div class="nav-controls">
                    <button id="prevBtn" class="nav-btn">← Prev</button>
                    <button id="nextBtn" class="nav-btn">Next →</button>
                </div>
                <button id="resetBtn" class="reset-btn">Play Again</button>
            </div>
        </div>
    </div>
    <script src="scripts/script.js"></script>
</body>

</html>

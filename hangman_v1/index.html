<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Pro - Time Attack</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="main-card">
            <div class="left-panel">
                <div class="stats-bar">
                    <div class="stat">Score: <span id="currentScore">0</span></div>
                    <div class="stat">Time: <span id="timer">60</span>s</div>
                </div>
                <canvas id="hangmanCanvas" width="200" height="250"></canvas>
                <h2>HANGMAN GAME</h2>
            </div>
            
            <div class="right-panel">
                <div class="category-tag">Category: <span id="categoryName"></span></div>
                <div id="wordDisplay" class="word-display"></div>
                <p class="hint"><strong>Hint:</strong> <span id="hintText"></span></p>
                <p class="status">Mistakes: <span id="mistakes" class="danger">0 / 6</span></p>
                
                <div id="keyboard" class="keyboard"></div>
                <button id="resetBtn" class="reset-btn">Next Word</button>
            </div>
        </div>
    </div>
    <script src="scripts/script.js"></script>
</body>
</html>
